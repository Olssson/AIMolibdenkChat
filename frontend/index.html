<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moly AI — Logowanie</title>
    <meta name="description" content="Moly AI Chat Assistant — Zaloguj się, aby porozmawiać z inteligentnym asystentem Moly.">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        moly: {
                            50: '#eef9ff',
                            100: '#d9f1ff',
                            200: '#bce8ff',
                            300: '#8edaff',
                            400: '#59c3ff',
                            500: '#33a5ff',
                            600: '#1b86f5',
                            700: '#146ee1',
                            800: '#1759b6',
                            900: '#194c8f',
                            950: '#142f57',
                        },
                        dark: {
                            900: '#0a0e1a',
                            800: '#0f1629',
                            700: '#151d35',
                            600: '#1b2540',
                            500: '#243050',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-up': 'slide-up 0.6s ease-out',
                        'fade-in': 'fade-in 0.8s ease-out',
                        'pulse-ring': 'pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 20px rgba(51, 165, 255, 0.15)' },
                            '100%': { boxShadow: '0 0 40px rgba(51, 165, 255, 0.35)' },
                        },
                        'slide-up': {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'fade-in': {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        'pulse-ring': {
                            '0%, 100%': { opacity: '0.5' },
                            '50%': { opacity: '0.1' },
                        },
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-dark-900 min-h-screen font-sans text-white overflow-hidden">

    <!-- Animated Background -->
    <div class="fixed inset-0 z-0">
        <!-- Gradient orbs -->
        <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-moly-600/10 blur-[128px] animate-float"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/10 blur-[128px] animate-float" style="animation-delay: -3s;"></div>
        <div class="absolute top-[40%] right-[20%] w-[300px] h-[300px] rounded-full bg-cyan-500/5 blur-[100px] animate-float" style="animation-delay: -1.5s;"></div>
        
        <!-- Grid pattern -->
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px); background-size: 60px 60px;"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md animate-slide-up">
            
            <!-- Logo & Heading -->
            <div class="text-center mb-8 animate-fade-in">
                <!-- Moly Logo Circle -->
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-moly-500 to-moly-700 shadow-lg shadow-moly-500/25 mb-6 animate-glow">
                    <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
                    </svg>
                </div>
                
                <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                    Moly AI Chat
                </h1>
                <p class="mt-2 text-gray-400 text-sm">
                    Inteligentny asystent biznesowy
                </p>
            </div>

            <!-- Login Card -->
            <div class="relative">
                <!-- Card glow effect -->
                <div class="absolute -inset-1 bg-gradient-to-r from-moly-600/20 via-purple-600/10 to-moly-600/20 rounded-3xl blur-lg opacity-60"></div>
                
                <div class="relative bg-dark-800/80 backdrop-blur-xl rounded-2xl border border-white/[0.08] p-8 shadow-2xl">
                    
                    <form id="login-form" class="space-y-5">
                        <!-- Email -->
                        <div class="space-y-2">
                            <label for="email-input" class="block text-sm font-medium text-gray-300">
                                Adres e-mail
                            </label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-500 group-focus-within:text-moly-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                    </svg>
                                </div>
                                <input 
                                    type="email" 
                                    id="email-input" 
                                    name="email"
                                    required 
                                    placeholder="twoj@email.com"
                                    autocomplete="email"
                                    class="w-full pl-12 pr-4 py-3.5 bg-dark-700/50 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 
                                           focus:outline-none focus:ring-2 focus:ring-moly-500/40 focus:border-moly-500/50 
                                           hover:border-white/[0.15] transition-all duration-300"
                                >
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="space-y-2">
                            <label for="password-input" class="block text-sm font-medium text-gray-300">
                                Hasło dostępu
                            </label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-500 group-focus-within:text-moly-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                    </svg>
                                </div>
                                <input 
                                    type="password" 
                                    id="password-input" 
                                    name="password"
                                    required 
                                    placeholder="••••••••••••"
                                    autocomplete="current-password"
                                    class="w-full pl-12 pr-12 py-3.5 bg-dark-700/50 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 
                                           focus:outline-none focus:ring-2 focus:ring-moly-500/40 focus:border-moly-500/50 
                                           hover:border-white/[0.15] transition-all duration-300"
                                >
                                <!-- Toggle visibility -->
                                <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-gray-300 transition-colors">
                                    <svg id="eye-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Error Message -->
                        <div id="error-message" class="hidden">
                            <div class="flex items-center gap-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl">
                                <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                                </svg>
                                <span id="error-text" class="text-sm text-red-300"></span>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            id="login-button"
                            class="w-full py-3.5 px-6 bg-gradient-to-r from-moly-600 to-moly-500 hover:from-moly-500 hover:to-moly-400 
                                   text-white font-semibold rounded-xl shadow-lg shadow-moly-600/25 
                                   hover:shadow-moly-500/30 hover:shadow-xl
                                   transform hover:scale-[1.02] active:scale-[0.98] 
                                   transition-all duration-300 
                                   disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none
                                   flex items-center justify-center gap-2"
                        >
                            <span id="login-text">Zaloguj się</span>
                            <svg id="login-spinner" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="mt-6 pt-6 border-t border-white/[0.06]">
                        <p class="text-center text-xs text-gray-500">
                            🔒 Połączenie szyfrowane · Dane chronione
                        </p>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <p class="text-center text-xs text-gray-600 mt-6">
                © 2027 Moly · Powered by AI
            </p>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
