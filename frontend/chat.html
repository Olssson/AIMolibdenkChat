<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moly AI Chat — Asystent</title>
    <meta name="description" content="Moly AI Chat — zadaj pytanie o platformę Moly, model finansowy, partnerów i strategię.">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        moly: {
                            50: '#eef9ff',
                            100: '#d9f1ff',
                            200: '#bce8ff',
                            300: '#8edaff',
                            400: '#59c3ff',
                            500: '#33a5ff',
                            600: '#1b86f5',
                            700: '#146ee1',
                            800: '#1759b6',
                            900: '#194c8f',
                            950: '#142f57',
                        },
                        dark: {
                            900: '#0a0e1a',
                            800: '#0f1629',
                            700: '#151d35',
                            600: '#1b2540',
                            500: '#243050',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-dark-900 min-h-screen font-sans text-white">

    <!-- Top Navigation Bar -->
    <header id="chat-header" class="fixed top-0 left-0 right-0 z-50 bg-dark-800/80 backdrop-blur-xl border-b border-white/[0.06]">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-moly-500 to-moly-700 flex items-center justify-center shadow-lg shadow-moly-600/20">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm font-semibold text-white">Moly AI Chat</h1>
                    <div class="flex items-center gap-1.5">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                        <span id="status-text" class="text-xs text-gray-400">Online</span>
                    </div>
                </div>
            </div>
            
            <!-- User & Actions -->
            <div class="flex items-center gap-3">
                <span id="user-email-display" class="text-xs text-gray-400 hidden sm:block"></span>
                <button id="logout-button" class="p-2 rounded-lg bg-dark-700/50 hover:bg-dark-600 border border-white/[0.06] text-gray-400 hover:text-white transition-all duration-200" title="Wyloguj">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Chat Messages Area -->
    <main id="chat-messages" class="pt-20 pb-32 max-w-4xl mx-auto px-4 space-y-1">
        
        <!-- Welcome Message -->
        <div id="welcome-message" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-moly-500/20 to-moly-700/20 border border-moly-500/20 flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-moly-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Witaj w Moly AI Chat</h2>
            <p class="text-gray-400 max-w-md mb-8">Jestem Twoim inteligentnym asystentem. Zapytaj mnie o ofertę Moly, model finansowy, strategię czy partnerów.</p>
            
            <!-- Suggested Questions -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-lg">
                <button class="suggested-question p-3 text-left bg-dark-700/40 hover:bg-dark-600/60 border border-white/[0.06] hover:border-moly-500/30 rounded-xl text-sm text-gray-300 hover:text-white transition-all duration-200" data-question="Czym jest Moly i jaka jest jego główna oferta?">
                    <span class="text-moly-400 mr-1">→</span> Czym jest Moly i jaka jest jego główna oferta?
                </button>
                <button class="suggested-question p-3 text-left bg-dark-700/40 hover:bg-dark-600/60 border border-white/[0.06] hover:border-moly-500/30 rounded-xl text-sm text-gray-300 hover:text-white transition-all duration-200" data-question="Jaki jest model finansowy Moly?">
                    <span class="text-moly-400 mr-1">→</span> Jaki jest model finansowy Moly?
                </button>
                <button class="suggested-question p-3 text-left bg-dark-700/40 hover:bg-dark-600/60 border border-white/[0.06] hover:border-moly-500/30 rounded-xl text-sm text-gray-300 hover:text-white transition-all duration-200" data-question="Jakie są kluczowe przewagi strategiczne Moly?">
                    <span class="text-moly-400 mr-1">→</span> Jakie są kluczowe przewagi strategiczne?
                </button>
                <button class="suggested-question p-3 text-left bg-dark-700/40 hover:bg-dark-600/60 border border-white/[0.06] hover:border-moly-500/30 rounded-xl text-sm text-gray-300 hover:text-white transition-all duration-200" data-question="Kim są partnerzy B2B Moly?">
                    <span class="text-moly-400 mr-1">→</span> Kim są partnerzy B2B Moly?
                </button>
            </div>
        </div>
    </main>

    <!-- Chat Input Area (Fixed Bottom) -->
    <footer id="chat-input-area" class="fixed bottom-0 left-0 right-0 z-50 bg-gradient-to-t from-dark-900 via-dark-900/95 to-transparent pt-6 pb-4">
        <div class="max-w-4xl mx-auto px-4">
            <form id="chat-form" class="relative">
                <div class="relative flex items-end bg-dark-700/60 backdrop-blur-xl border border-white/[0.08] rounded-2xl shadow-2xl shadow-black/20 focus-within:border-moly-500/30 focus-within:ring-1 focus-within:ring-moly-500/20 transition-all duration-300">
                    <textarea 
                        id="message-input" 
                        rows="1"
                        placeholder="Zadaj pytanie o Moly..."
                        class="flex-1 bg-transparent text-white placeholder-gray-500 px-5 py-4 pr-14 resize-none max-h-40 focus:outline-none text-[15px]"
                        style="field-sizing: content;"
                    ></textarea>
                    
                    <!-- Send Button -->
                    <button 
                        type="submit" 
                        id="send-button"
                        class="absolute right-3 bottom-3 p-2.5 bg-gradient-to-r from-moly-600 to-moly-500 hover:from-moly-500 hover:to-moly-400 
                               rounded-xl text-white shadow-lg shadow-moly-600/20 
                               transform hover:scale-105 active:scale-95 
                               transition-all duration-200
                               disabled:opacity-30 disabled:cursor-not-allowed disabled:transform-none"
                        disabled
                    >
                        <svg id="send-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                        <svg id="send-spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24" fill="none">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </button>
                </div>
            </form>
            <p class="text-center text-xs text-gray-600 mt-2">
                Odpowiedzi generowane na podstawie oficjalnych dokumentów Moly
            </p>
        </div>
    </footer>

    <script src="assets/js/chat.js"></script>
</body>
</html>
